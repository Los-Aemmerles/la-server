repos:
  # ------------------------------------
  # Generate requirements.txt if needed
  # ------------------------------------
  - repo: local
    hooks:
      - id: requirements.txt
        name: Create requirements.txt
        entry: "python scripts/$check_poetry_to_requirements.py"
        language: system
        # Only Poetry inputs matter; hook ignores argv and uses staged files.
        # Do not match all Python files: pre-commit runs those invocations in
        # parallel and each one called `git add`, causing index.lock races.
        files: ^(pyproject\.toml|poetry\.lock)$
        pass_filenames: false
        require_serial: true

  # ------------------------------------
  # General repo hygiene
  # ------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  # ------------------------------------
  # Run local installed tools
  # ------------------------------------
  - repo: local
    hooks:
      # ------------------------------------
      # Black (formatting)
      # ------------------------------------
      - id: black
        name: Black code format check
        entry: "poetry run black"
        args: ["--check", "--diff"]
        language: system
        types: [python]
        pass_filenames: true

      # ------------------------------------
      # Ruff (lint)
      # ------------------------------------
      - id: ruff
        name: Ruff lint check
        entry: "poetry run ruff"
        args: ["check"]
        language: system
        types: [python]
        pass_filenames: true

      # ------------------------
      # Pytest (pre-push)
      # ------------------------
      - id: pytest
        name: Run Pytest
        entry: "poetry run pytest"
        args: ["--maxfail=1", "--disable-warnings"]
        language: system
        types: [python]
        pass_filenames: false
