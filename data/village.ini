[general]
# The name is used for the name of the village in the app.
name = Kinderspielstadt Los Ämmerles
# The location is used for the location of the village in the app.
location = Ammerbuch
# The language is used to switch the language of the app.
language = de
# The year is used to show the year of the village in the app.
year = 2026

[currency]
# The currency name is used for the currency in the app.
name = "Ammertaler"
name_short = "AT"

[hourly_pay]
# The hourly pay in the company table row is the base hourly pay for the village.
# The increase is added to the base hourly for the village.
increase = 0
# The tax is the tax rate for the village.
tax = 3

[village-images]
# Logo and favicon are stored in the images folder,  they are used for the app.
logo = images/logo.png
favicon = images/favicon.png

[village-theme]
# Base palette
accent = #2563eb      ; Primary brand color for the header bar, footer bar, and the fallback window icon when no logo is available
on-accent = #ffffff   ; Text color for anything placed on top of the accent background
bg = #f4f6fa          ; Page / board background color for the entire village board
surface = #ffffff     ; Card surface background color for each individual company card
border = #d1dae6      ; Subtle divider / default border color (currently unused in app, wired up next)
text = #162032        ; Primary text color for company names, pay labels, notes, status bar
muted = #5c6b80       ; Muted / secondary text for pay rate and notes labels (replaces CSS opacity trick)

# Status colors
ok     =  #15803d     ; foreground: card border + badge text
ok-bg  = #dcfce7      ; background: badge pill
warn    = #b45309     ; foreground: card border + badge text
warn-bg = #fef9c3     ; background: badge pill
bad    = #b91c1c      ; foreground: card border + badge text
bad-bg = #fee2e2      ; background: badge pill
